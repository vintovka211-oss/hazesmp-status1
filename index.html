<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HazeSMP — Статус сервера</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #ffd89b, #c7e9fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 10px;
        }
        .status-online {
            background: #00c853;
            color: white;
        }
        .status-offline {
            background: #d32f2f;
            color: white;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .info-label {
            font-weight: 600;
            color: #aaa;
        }
        .info-value {
            font-weight: 500;
            text-align: right;
        }
        .players-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .player-item {
            background: rgba(255,255,255,0.05);
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .player-avatar {
            width: 30px;
            height: 30px;
            background: #ffd89b;
            border-radius: 50%;
            display: inline-block;
        }
        .ping-good { color: #00c853; }
        .ping-normal { color: #ffc107; }
        .ping-bad { color: #ff5722; }
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #666;
        }
        .copy-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .refresh-btn {
            background: #ffd89b;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
        }
        .last-update {
            font-size: 10px;
            color: #888;
            text-align: center;
            margin-top: 10px;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #ffd89b;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 HazeSMP</h1>
            <div id="status-badge" class="status-badge">Загрузка...</div>
        </div>

        <div class="card">
            <div class="info-row">
                <span class="info-label">📊 Онлайн</span>
                <span class="info-value" id="online">-- / --</span>
            </div>
            <div class="info-row">
                <span class="info-label">🎮 Версия</span>
                <span class="info-value" id="version">--</span>
            </div>
            <div class="info-row">
                <span class="info-label">📡 Пинг</span>
                <span class="info-value" id="ping">-- мс</span>
            </div>
            <div class="info-row">
                <span class="info-label">⏱ Uptime</span>
                <span class="info-value" id="uptime">--</span>
            </div>
            <div class="info-row">
                <span class="info-label">🖥️ IP сервера</span>
                <span class="info-value" id="ip">hi3.qwertyx.host:27228 <button class="copy-btn" onclick="copyIP()">📋</button></span>
            </div>
            <div class="info-row">
                <span class="info-label">📝 MOTD</span>
                <span class="info-value" id="motd" style="max-width: 200px;">--</span>
            </div>
        </div>

        <div class="card">
            <div class="info-label" style="margin-bottom: 10px;">👥 Игроки в сети (<span id="players-count">0</span>)</div>
            <div id="players-list" class="players-list">
                <div style="text-align: center; color: #888;">Загрузка...</div>
            </div>
        </div>

        <button class="refresh-btn" onclick="loadData()">🔄 Обновить</button>
        <div class="last-update" id="last-update">—</div>
        <div class="footer">
            ⚡ Данные обновляются автоматически каждые 10 секунд
        </div>
    </div>

    <script>
        let playersList = [];
        let uptimeStart = null;

        function copyIP() {
            navigator.clipboard.writeText('hi3.qwertyx.host:27228');
            alert('✅ IP скопирован!');
        }

        function formatUptime(seconds) {
            if (!seconds) return '--';
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            if (days > 0) return `${days}д ${hours}ч ${minutes}м`;
            if (hours > 0) return `${hours}ч ${minutes}м`;
            return `${minutes}м`;
        }

        function getPingColor(ping) {
            if (ping < 60) return 'ping-good';
            if (ping < 120) return 'ping-normal';
            return 'ping-bad';
        }

        async function loadData() {
            try {
                // Используем публичное API для получения статуса сервера
                const response = await fetch(`https://api.mcsrvstat.us/2/hi3.qwertyx.host:27228`);
                const data = await response.json();
                
                const statusBadge = document.getElementById('status-badge');
                const onlineSpan = document.getElementById('online');
                const versionSpan = document.getElementById('version');
                const pingSpan = document.getElementById('ping');
                const motdSpan = document.getElementById('motd');
                const playersCountSpan = document.getElementById('players-count');
                const playersListDiv = document.getElementById('players-list');
                const lastUpdateSpan = document.getElementById('last-update');
                
                if (data.online) {
                    statusBadge.textContent = '🟢 СЕРВЕР РАБОТАЕТ';
                    statusBadge.className = 'status-badge status-online';
                    onlineSpan.textContent = `${data.players.online} / ${data.players.max}`;
                    versionSpan.textContent = data.version || '1.21.4';
                    pingSpan.innerHTML = `<span class="${getPingColor(data.ping)}">${data.ping || '--'} мс</span>`;
                    motdSpan.textContent = data.motd?.clean?.join(' ') || 'Добро пожаловать!';
                    
                    const players = data.players.list || [];
                    playersCountSpan.textContent = players.length;
                    
                    if (players.length === 0) {
                        playersListDiv.innerHTML = '<div style="text-align: center; color: #888;">🌙 Никого нет</div>';
                    } else {
                        playersListDiv.innerHTML = players.map(p => `
                            <div class="player-item">
                                <div class="player-avatar" style="background: linear-gradient(135deg, #ffd89b, #c7e9fb);"></div>
                                <span>${p}</span>
                            </div>
                        `).join('');
                    }
                } else {
                    statusBadge.textContent = '🔴 СЕРВЕР ВЫКЛЮЧЕН';
                    statusBadge.className = 'status-badge status-offline';
                    onlineSpan.textContent = '0 / 0';
                    versionSpan.textContent = '--';
                    pingSpan.textContent = '-- мс';
                    motdSpan.textContent = 'Сервер не доступен';
                    playersCountSpan.textContent = '0';
                    playersListDiv.innerHTML = '<div style="text-align: center; color: #888;">Сервер выключен</div>';
                }
                
                lastUpdateSpan.textContent = `Обновлено: ${new Date().toLocaleTimeString()}`;
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('status-badge').textContent = '❌ ОШИБКА';
                document.getElementById('status-badge').className = 'status-badge status-offline';
            }
        }

        // Загружаем данные сразу при открытии
        loadData();
        
        // Автообновление каждые 10 секунд
        setInterval(loadData, 10000);
    </script>
</body>
</html>
